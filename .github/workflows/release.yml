name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.5) — must already exist or will be created from the current commit"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache vcpkg archives
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/vcpkg/archives
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          arch: win64_msvc2022_64
          modules: qtshadertools
          cache: true

      - name: Link Qt into expected path
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "qt\6.8.3" | Out-Null
          cmd /c mklink /J "qt\6.8.3\msvc2022_64" "$env:QT_ROOT_DIR"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build GUI (Release)
        shell: pwsh
        run: cmake --build build --config Release --target streamsoft_gui

      - name: Build installer
        shell: pwsh
        run: cmake --build build --config Release --target installer

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          version="${{ steps.tag.outputs.name }}"
          version="${version#v}"
          awk -v ver="## $version" '
            $0 == ver { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "StreamSoft $version" > release_notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: StreamSoft ${{ steps.tag.outputs.name }}
          body_path: release_notes.md
          files: installer/Output/StreamSoftSetup.exe
