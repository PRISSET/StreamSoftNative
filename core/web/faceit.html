<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Stream Chat Overlay — Faceit</title>
<style>
  html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; width: 100%; height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  :root {
    --accent: #ff5500;
    --accent-dim: rgba(255, 85, 0, 0.14);
    --card-bg: linear-gradient(160deg, rgba(22, 22, 26, 0.96), rgba(10, 10, 12, 0.98));
    --card-border: rgba(255, 255, 255, 0.07);
  }

  /* Designed directly at this OBS source's native resolution (820x300, see
     kFaceitWidth/kFaceitHeight in obs_client.hpp) — landscape, sized with
     generous headroom on purpose so a small miscalculation doesn't clip
     content the way earlier narrower/shorter attempts did. */
  #card {
    box-sizing: border-box;
    position: relative;
    width: 100%;
    height: 100%;
    padding: 22px;
    border-radius: 26px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: #f5f5f6;
    display: none;
    flex-direction: column;
    gap: 10px;
    box-shadow: 0 14px 34px rgba(0, 0, 0, 0.45);
    overflow: hidden;
  }
  #card.visible { display: flex; }

  #glow {
    position: absolute;
    top: -90px;
    right: -90px;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-dim), transparent 70%);
    pointer-events: none;
    animation: glow-drift 13s ease-in-out infinite;
  }
  @keyframes glow-drift {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.9; }
    50% { transform: translate(-36px, 26px) scale(1.2); opacity: 0.55; }
  }

  #particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  /* Slow-drifting dust/embers — the "wind" cue. Positions/timings are
     randomized per-particle in JS (see spawnParticles) so they don't read
     as a mechanical loop. */
  .particle {
    position: absolute;
    bottom: 10px;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    pointer-events: none;
    animation-name: particle-float;
    animation-timing-function: ease-in;
    animation-iteration-count: infinite;
  }
  @keyframes particle-float {
    0% { transform: translate(0, 0); opacity: 0; }
    12% { opacity: 0.55; }
    85% { opacity: 0.15; }
    100% { transform: translate(var(--drift-x, 24px), -180px); opacity: 0; }
  }

  #elo.flash { animation: elo-flash 0.9s ease-out; }
  @keyframes elo-flash {
    0% { text-shadow: 0 0 2px var(--accent), 0 0 28px var(--accent); }
    100% { text-shadow: 0 0 22px var(--accent-dim); }
  }

  #top {
    display: flex;
    align-items: center;
    gap: 24px;
    flex: 1;
    min-height: 0;
    position: relative;
  }

  #head {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 190px;
    flex-shrink: 0;
  }
  #avatar {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    object-fit: cover;
    background: rgba(255, 255, 255, 0.08);
    border: 4px solid var(--accent);
    box-sizing: border-box;
    flex-shrink: 0;
  }
  #avatar.hidden { display: none; }
  #head-text { min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  #nickname {
    font-size: 20px;
    font-weight: 800;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #skill {
    align-self: flex-start;
    font-size: 13px;
    padding: 3px 10px;
    border-radius: 999px;
    background: var(--accent);
    color: #150c06;
    font-weight: 800;
  }

  #divider { width: 1px; align-self: stretch; background: var(--card-border); flex-shrink: 0; }

  #elo-section {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    flex: 1.1;
    min-width: 0;
  }
  #label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    font-weight: 800;
  }
  #elo-row { display: flex; align-items: baseline; gap: 10px; }
  #elo {
    font-size: 44px;
    font-weight: 800;
    line-height: 1;
    text-shadow: 0 0 22px var(--accent-dim);
  }
  #elo-today {
    font-size: 13px;
    font-weight: 800;
    padding: 3px 9px;
    border-radius: 999px;
  }
  #elo-today.hidden { display: none; }
  #elo-today.up { color: #6ee7a8; background: rgba(110, 231, 168, 0.14); }
  #elo-today.down { color: #ff7882; background: rgba(255, 120, 130, 0.14); }
  #elo-today.flat { color: rgba(255, 255, 255, 0.6); background: rgba(255, 255, 255, 0.08); }
  #sparkline { width: 100%; height: 34px; }

  #divider2 { width: 1px; align-self: stretch; background: var(--card-border); flex-shrink: 0; }

  #stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 230px;
    flex-shrink: 0;
  }
  .stat-tile {
    background: var(--accent-dim);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 8px 12px;
  }
  .stat-tile .v { font-size: 18px; font-weight: 800; }
  .stat-tile .l { font-size: 10px; color: rgba(255, 255, 255, 0.55); text-transform: uppercase; letter-spacing: 0.04em; }

  #matches {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    position: relative;
  }
  .match {
    flex: 1;
    min-width: 0;
    border-radius: 12px;
    padding: 6px 4px 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .match.win { background: rgba(110, 231, 168, 0.12); border: 1px solid rgba(110, 231, 168, 0.5); }
  .match.loss { background: rgba(255, 120, 130, 0.12); border: 1px solid rgba(255, 120, 130, 0.5); }
  .match .map-badge {
    width: 30px;
    height: 30px;
    object-fit: contain;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
  }
  .match .match-text { display: flex; flex-direction: column; align-items: flex-start; min-width: 0; }
  .match .wl { font-size: 13px; font-weight: 800; line-height: 1.3; }
  .match.win .wl { color: #6ee7a8; }
  .match.loss .wl { color: #ff7882; }
  .match .kd { font-size: 11px; color: rgba(255, 255, 255, 0.55); line-height: 1.3; }

  /* Fed by CS2's own Game State Integration (see gsi_state.hpp) — shown
     below the last-5-matches row while a match is actually in progress
     (history stays visible too, it just sits above this). Deliberately
     just map/round/score/K-D-A, not health/armor — that's already visible
     in the game itself, this is for the viewers. */
  #live {
    display: none;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    border-radius: 12px;
    padding: 8px 16px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
  }
  #live.visible { display: flex; }
  #live-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #ff4d4d;
    flex-shrink: 0;
    animation: live-pulse 1.4s ease-in-out infinite;
  }
  @keyframes live-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  #live-label { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #ff4d4d; flex-shrink: 0; }
  #live-map { font-size: 14px; font-weight: 700; color: rgba(255, 255, 255, 0.85); flex-shrink: 0; }
  #live-score { font-size: 22px; font-weight: 800; display: flex; align-items: baseline; gap: 6px; margin-left: auto; }
  #live-score .side { color: rgba(255, 255, 255, 0.4); }
  #live-score .side.mine { color: var(--accent); }
  #live-kda { font-size: 13px; font-weight: 700; color: rgba(255, 255, 255, 0.75); flex-shrink: 0; }

  /* Shown only while the betting window is actually open (see
     GsiState::betting_open_) — separate from #live so it can disappear the
     moment the configured round starts without touching the score/K-D-A
     strip, which keeps showing for the rest of the match. */
  #bet-banner {
    display: none;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    border-radius: 12px;
    padding: 6px 16px;
    background: rgba(110, 231, 168, 0.12);
    border: 1px solid rgba(110, 231, 168, 0.5);
  }
  #bet-banner.visible { display: flex; }
  #bet-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #6ee7a8;
    flex-shrink: 0;
    animation: live-pulse 1.4s ease-in-out infinite;
  }
  #bet-text { font-size: 13px; font-weight: 800; color: #6ee7a8; }
</style>
</head>
<body>

<div id="card">
  <div id="glow"></div>
  <div id="particles"></div>
  <div id="top">
    <div id="head">
      <img id="avatar" class="hidden" />
      <div id="head-text">
        <div id="nickname"></div>
        <div id="skill"></div>
      </div>
    </div>

    <div id="divider"></div>

    <div id="elo-section">
      <div id="label">FACEIT · CS2</div>
      <div id="elo-row">
        <div id="elo"></div>
        <div id="elo-today" class="hidden"></div>
      </div>
      <svg id="sparkline" viewBox="0 0 100 30" preserveAspectRatio="none"></svg>
    </div>

    <div id="divider2"></div>

    <div id="stats"></div>
  </div>

  <div id="matches"></div>
  <div id="live">
    <div id="live-dot"></div>
    <div id="live-label">Live</div>
    <div id="live-map"></div>
    <div id="live-score"><span class="side" id="live-ct">0</span>:<span class="side" id="live-t">0</span></div>
    <div id="live-kda"></div>
  </div>
  <div id="bet-banner">
    <div id="bet-dot"></div>
    <div id="bet-text"></div>
  </div>
</div>

<script>
  const KNOWN_MAPS = ["mirage", "dust2", "inferno", "nuke", "ancient", "anubis", "vertigo", "train", "overpass", "cache"];

  // Random per-particle timing/position so the "wind" doesn't read as a
  // mechanical loop — spawned once, then just keeps looping via CSS.
  function spawnParticles() {
    const container = document.getElementById("particles");
    const count = 7;
    for (let i = 0; i < count; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      p.style.left = Math.round(Math.random() * 100) + "%";
      p.style.setProperty("--drift-x", Math.round((Math.random() - 0.5) * 60) + "px");
      const duration = 7 + Math.random() * 6;
      p.style.animationDuration = duration.toFixed(1) + "s";
      p.style.animationDelay = (-Math.random() * duration).toFixed(1) + "s";
      container.appendChild(p);
    }
  }

  // Pushed by core over the same /ws every overlay page connects to (see
  // overlay_server.hpp's "cs2_live" broadcasts) — this is CS2's own Game
  // State Integration, not a Faceit API poll, so it updates the instant the
  // game reports a change instead of waiting for the next 20s /refresh.
  let liveState = null;
  let lastMatches = [];
  let lastEloValue = null;
  let ws;

  function connectWs() {
    ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === "cs2_live") {
        liveState = data;
        renderMatchesArea();
      }
    };
    ws.onclose = () => setTimeout(connectWs, 2000);
    ws.onerror = () => ws.close();
  }

  function applyLiveStrip() {
    document.getElementById("live-map").textContent = liveState.map || "—";
    document.getElementById("live-ct").textContent = liveState.ctScore || 0;
    document.getElementById("live-t").textContent = liveState.tScore || 0;
    document.getElementById("live-ct").classList.toggle("mine", liveState.playerTeam === "CT");
    document.getElementById("live-t").classList.toggle("mine", liveState.playerTeam === "T");
    document.getElementById("live-kda").textContent =
      `K/D/A ${liveState.kills || 0}/${liveState.deaths || 0}/${liveState.assists || 0}`;

    const banner = document.getElementById("bet-banner");
    if (liveState.bettingOpen) {
      banner.classList.add("visible");
      document.getElementById("bet-text").textContent =
        "Ставки открыты: !bet win / !bet lose — принимаются до раунда " + (liveState.lockRound || "?");
    } else {
      banner.classList.remove("visible");
    }
  }

  // The last-5-matches strip stays visible at all times now — it just sits
  // above the live strip/bet banner instead of being replaced by them, so
  // viewers can still see match history while a game is in progress.
  function renderMatchesArea() {
    const live = document.getElementById("live");
    renderMatchHistory(lastMatches);
    if (liveState && liveState.active) {
      live.classList.add("visible");
      applyLiveStrip();
    } else {
      live.classList.remove("visible");
      document.getElementById("bet-banner").classList.remove("visible");
    }
  }

  function mapIconUrl(rawMap) {
    if (!rawMap) return null;
    const key = rawMap.toLowerCase().replace(/^de_/, "");
    if (!KNOWN_MAPS.includes(key)) return null;
    return "/static/map-de_" + key + ".png";
  }

  function drawSparkline(points) {
    const svg = document.getElementById("sparkline");
    svg.innerHTML = "";
    if (!points || points.length < 2) return;

    const elos = points.map((p) => p.elo);
    const min = Math.min(...elos);
    const max = Math.max(...elos);
    const range = Math.max(1, max - min);
    const stepX = 100 / (points.length - 1);

    const coords = points.map((p, i) => {
      const x = i * stepX;
      const y = 28 - ((p.elo - min) / range) * 26;
      return x + "," + y;
    });

    const fillPoints = "0,30 " + coords.join(" ") + " 100,30";
    const fill = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
    fill.setAttribute("points", fillPoints);
    fill.setAttribute("fill", "#ff5500");
    fill.setAttribute("opacity", "0.15");
    svg.appendChild(fill);

    const line = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
    line.setAttribute("points", coords.join(" "));
    line.setAttribute("fill", "none");
    line.setAttribute("stroke", "#ff5500");
    line.setAttribute("stroke-width", "2.5");
    line.setAttribute("stroke-linecap", "round");
    line.setAttribute("stroke-linejoin", "round");
    svg.appendChild(line);
  }

  function statTile(value, label) {
    const el = document.createElement("div");
    el.className = "stat-tile";
    const v = document.createElement("div");
    v.className = "v";
    v.textContent = value;
    const l = document.createElement("div");
    l.className = "l";
    l.textContent = label;
    el.appendChild(v);
    el.appendChild(l);
    return el;
  }

  function applyEloToday(data) {
    const el = document.getElementById("elo-today");
    if (!data.has_elo_change_today) {
      el.classList.add("hidden");
      return;
    }
    const change = data.elo_change_today || 0;
    el.classList.remove("hidden", "up", "down", "flat");
    if (change > 0) {
      el.classList.add("up");
      el.textContent = "+" + change + " сегодня";
    } else if (change < 0) {
      el.classList.add("down");
      el.textContent = change + " сегодня";
    } else {
      el.classList.add("flat");
      el.textContent = "±0 сегодня";
    }
  }

  async function refresh() {
    try {
      const resp = await fetch("/api/faceit/snapshot", { cache: "no-store" });
      const data = await resp.json();
      const card = document.getElementById("card");

      if (!data.valid) {
        card.classList.remove("visible");
        return;
      }
      card.classList.add("visible");
      document.getElementById("nickname").textContent = data.nickname || "";
      const eloEl = document.getElementById("elo");
      eloEl.textContent = data.elo || "—";
      if (lastEloValue !== null && data.elo && data.elo !== lastEloValue) {
        eloEl.classList.remove("flash");
        void eloEl.offsetWidth; // restart the animation even if it's already mid-flash
        eloEl.classList.add("flash");
      }
      if (data.elo) lastEloValue = data.elo;
      document.getElementById("skill").textContent = "LVL " + (data.skill_level || "?");
      applyEloToday(data);

      const avatar = document.getElementById("avatar");
      if (data.avatar) {
        avatar.src = data.avatar;
        avatar.classList.remove("hidden");
      } else {
        avatar.classList.add("hidden");
      }

      drawSparkline(data.elo_history || []);

      const statsEl = document.getElementById("stats");
      statsEl.innerHTML = "";
      const lt = data.lifetime || {};
      if (lt.valid) {
        statsEl.appendChild(statTile(Math.round(lt.win_rate || 0) + "%", "Винрейт"));
        statsEl.appendChild(statTile((lt.avg_kd || 0).toFixed(2), "Средний K/D"));
        statsEl.appendChild(statTile(Math.round(lt.avg_headshots || 0) + "%", "HS%"));
        const streakLabel = lt.current_streak > 0 ? "Серия побед" : "Лучшая серия";
        const streakValue = lt.current_streak > 0 ? lt.current_streak : lt.longest_streak;
        statsEl.appendChild(statTile(streakValue || 0, streakLabel));
      }

      lastMatches = data.matches || [];
      renderMatchesArea();
    } catch (e) {
      // Overlay browser source with no core running yet — just keep the
      // widget hidden and retry on the next tick instead of throwing.
    }
  }

  function renderMatchHistory(matches) {
    const matchesEl = document.getElementById("matches");
    matchesEl.innerHTML = "";
    // FACEIT's history API returns oldest-of-the-batch first — reverse so
    // the most recent match reads leftmost, matching FACEIT's own site.
    matches.slice().reverse().forEach((m) => {
      const d = document.createElement("div");
      d.className = "match " + (m.win ? "win" : "loss");

      const iconUrl = mapIconUrl(m.map);
      if (iconUrl) {
        const badge = document.createElement("img");
        badge.className = "map-badge";
        badge.src = iconUrl;
        badge.title = m.map || "";
        badge.onerror = () => badge.remove();
        d.appendChild(badge);
      }

      const text = document.createElement("div");
      text.className = "match-text";

      const wl = document.createElement("div");
      wl.className = "wl";
      wl.textContent = m.win ? "Победа" : "Поражение";
      text.appendChild(wl);

      if (m.kills >= 0 && m.deaths >= 0) {
        const kd = document.createElement("div");
        kd.className = "kd";
        kd.textContent = m.kills + "/" + m.deaths;
        text.appendChild(kd);
      }

      d.appendChild(text);
      matchesEl.appendChild(d);
    });
  }

  spawnParticles();
  connectWs();
  refresh();
  setInterval(refresh, 20000);
</script>
</body>
</html>
