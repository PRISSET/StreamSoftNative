<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Stream Chat Overlay — CS2 HUD</title>
<style>
  html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; width: 100%; height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  :root {
    --accent: #3b82f6;
    --ct: #6fa8ff;
    --t: #e8b34d;
    --card-bg: linear-gradient(160deg, rgba(22, 22, 26, 0.96), rgba(10, 10, 12, 0.98));
    --card-border: rgba(255, 255, 255, 0.07);
  }

  /* Designed directly at this OBS source's native resolution (900x160, see
     kCs2HudWidth/kCs2HudHeight in obs_client.hpp) — a thin horizontal bar
     meant to sit near the top of the game capture, not a full overlay. */
  #card {
    box-sizing: border-box;
    position: relative;
    width: 100%;
    height: 100%;
    padding: 14px 22px;
    border-radius: 18px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: #f5f5f6;
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
    overflow: hidden;
  }
  #card.visible { display: flex; }

  #row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
  }

  #map {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: rgba(245, 245, 246, 0.6);
    min-width: 140px;
  }
  #map span { color: #fff; }

  #score {
    display: flex;
    align-items: baseline;
    gap: 10px;
    font-weight: 800;
    font-size: 40px;
    font-variant-numeric: tabular-nums;
  }
  #score .side { color: rgba(245, 245, 246, 0.45); transition: color 0.2s; }
  #score .side.mine { color: var(--accent); }
  #score .sep { color: rgba(245, 245, 246, 0.3); font-size: 24px; }

  #stats {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 15px;
    font-weight: 600;
    min-width: 200px;
    justify-content: flex-end;
  }
  #stats .stat { display: flex; align-items: center; gap: 5px; color: rgba(245, 245, 246, 0.85); }
  #stats .label { font-size: 11px; color: rgba(245, 245, 246, 0.45); text-transform: uppercase; }
  #hp-bar, #armor-bar {
    width: 46px;
    height: 6px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.12);
    overflow: hidden;
  }
  #hp-fill { height: 100%; background: #3ddc84; }
  #armor-fill { height: 100%; background: #6fa8ff; }

  #betting {
    display: none;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: #0a0a0c;
    background: var(--accent);
    border-radius: 8px;
    padding: 4px 10px;
  }
  #betting.visible { display: block; }
</style>
</head>
<body>

<div id="card">
  <div id="row">
    <div id="map">de_<span id="map-name">—</span></div>
    <div id="score">
      <span class="side" id="ct-score">0</span>
      <span class="sep">:</span>
      <span class="side" id="t-score">0</span>
    </div>
    <div id="stats">
      <div class="stat">
        <div class="label">HP</div>
        <div id="hp-bar"><div id="hp-fill" style="width:100%"></div></div>
      </div>
      <div class="stat">
        <div class="label">ARM</div>
        <div id="armor-bar"><div id="armor-fill" style="width:0%"></div></div>
      </div>
      <div class="stat" id="kda">0/0/0</div>
    </div>
  </div>
  <div id="betting">Ставки открыты — !bet win/lose &lt;баллы&gt;</div>
</div>

<script>
  let ws;

  function connectWs() {
    ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === "cs2_hud") applyState(data);
    };
    ws.onclose = () => setTimeout(connectWs, 2000);
    ws.onerror = () => ws.close();
  }

  function applyState(data) {
    const card = document.getElementById("card");
    if (!data.active) {
      card.classList.remove("visible");
      return;
    }
    card.classList.add("visible");

    document.getElementById("map-name").textContent = (data.map || "—").replace(/^de_/, "");
    document.getElementById("ct-score").textContent = data.ctScore || 0;
    document.getElementById("t-score").textContent = data.tScore || 0;

    const ctEl = document.getElementById("ct-score");
    const tEl = document.getElementById("t-score");
    ctEl.classList.toggle("mine", data.playerTeam === "CT");
    tEl.classList.toggle("mine", data.playerTeam === "T");

    const hp = Math.max(0, Math.min(100, data.health || 0));
    const armor = Math.max(0, Math.min(100, data.armor || 0));
    document.getElementById("hp-fill").style.width = hp + "%";
    document.getElementById("armor-fill").style.width = armor + "%";
    document.getElementById("kda").textContent = `${data.kills || 0}/${data.deaths || 0}/${data.assists || 0}`;

    document.getElementById("betting").classList.toggle("visible", !!data.bettingOpen);
  }

  connectWs();
</script>
</body>
</html>
